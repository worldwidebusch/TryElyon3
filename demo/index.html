<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Private sales-demo pages: keep out of search + link graph. -->
<meta name="robots" content="noindex, nofollow">
<meta name="googlebot" content="noindex, nofollow">
<title>Demo IA para The Shop Automotive Service | Elyon</title>
<meta name="description" content="Demostración personalizada de la recepcionista de IA de Elyon.">
<meta name="theme-color" content="#0F0F12">
<link rel="icon" type="image/svg+xml" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%230F0F12"/><rect x="22" y="22" width="12" height="56" fill="%23EFEDE6"/><rect x="22" y="22" width="56" height="12" fill="%232038E6"/><rect x="22" y="44" width="44" height="12" fill="%23EFEDE6"/><rect x="22" y="66" width="32" height="12" fill="%23EFEDE6"/></svg>'>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@400;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<!-- ANALYTICS: the same GA4 / Meta Pixel snippet used on the main site can be
     pasted here; events already fire through trackEvent() in demo-page.js. -->
<link rel="stylesheet" href="/demo/demo.css">
</head>
<body>
<a class="skip" href="#main">Ir al contenido</a>

<header class="topbar">
  <a class="brand" href="https://tryelyon.com/" aria-label="Elyon — inicio">
    <svg class="mark" viewBox="-20 -20 100 100" aria-hidden="true"><rect x="0" y="0" width="13" height="60" fill="#131316"/><rect x="0" y="0" width="60" height="13" fill="#2038E6"/><rect x="0" y="23.5" width="47" height="13" fill="#131316"/><rect x="0" y="47" width="34" height="13" fill="#131316"/></svg>
    ELYON
  </a>
  <a class="home" href="https://tryelyon.com/">tryelyon.com</a>
</header>

<main id="main">

  <!-- ============================= ACTIVE ============================= -->
  <section id="view-active" class="hidden">
    <div class="wrap grid-bg">
      <div class="hero reg">

        <!-- left: pitch -->
        <div class="hero-left">
          <span class="badge"><span class="dot" aria-hidden="true"></span><span id="badge-text">Demo personalizada</span></span>
          <h1 class="h1 disp" id="headline"></h1>
          <p class="lede" id="lede"></p>
          <div class="meta-row" id="meta"></div>
        </div>

        <!-- right: the live widget -->
        <div class="hero-right">
          <div class="card brk">
            <span class="c tl" aria-hidden="true"></span><span class="c tr" aria-hidden="true"></span>
            <span class="c bl" aria-hidden="true"></span><span class="c br" aria-hidden="true"></span>
            <div class="card-head">
              <span class="t" id="card-title"></span>
              <span class="idx" aria-hidden="true">VOICE · AI</span>
            </div>
            <div class="card-body">
              <ol class="steps" id="steps"></ol>

              <div class="widget-zone" id="widget-zone" data-widget-state="loading" aria-live="polite">
                <div class="loading" id="widget-loading">
                  <div class="bars" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span></div>
                  <span class="t" id="loading-text">Iniciando la recepcionista…</span>
                </div>
              </div>

              <div class="qs">
                <div class="qs-lbl" id="qs-label"></div>
                <ul id="qs-list"></ul>
              </div>

              <p class="notice" id="demo-notice"></p>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- why elyon / benefits -->
    <section class="benefits grid-bg">
      <div class="wrap reg">
        <span class="lbl bf-eyebrow" id="bf-eyebrow"></span>
        <h2 class="disp" id="bf-h"></h2>
        <p class="bf-lede" id="bf-lede"></p>
        <div class="bf-grid" id="benefits-grid"></div>
      </div>
    </section>

    <!-- conversion -->
    <section class="convert">
      <div class="wrap reg">
        <h2 class="disp" id="cv-h"></h2>
        <p id="cv-p"></p>
        <div class="cta-row">
          <a class="btn fill" id="cta-trial" target="_blank" rel="noopener"></a>
          <a class="btn" id="cta-tech" target="_blank" rel="noopener"></a>
        </div>
      </div>
    </section>
  </section>

  <!-- ============================= ENDED ============================== -->
  <section id="view-ended" class="state grid-bg hidden">
    <div class="inner-state">
      <div class="code" aria-hidden="true">— —</div>
      <h1 class="disp" id="ended-title"></h1>
      <p id="ended-body"></p>
      <a class="btn fill" id="ended-btn" target="_blank" rel="noopener"></a>
    </div>
  </section>

  <!-- =========================== NOT FOUND =========================== -->
  <section id="view-notfound" class="state grid-bg hidden">
    <div class="inner-state">
      <div class="code" aria-hidden="true">404</div>
      <h1 class="disp" id="nf-title"></h1>
      <p id="nf-body"></p>
      <a class="btn fill" id="nf-btn"></a>
    </div>
  </section>

</main>

<footer class="foot">
  <span>© 2026 Elyon · Demostración privada</span>
  <span>tryelyon.com</span>
</footer>

<script src="/demo/demo-config.js"></script>
<script src="/demo/widget-loader.js"></script>
<script src="/demo/demo-page.js"></script>
</body>
</html>
