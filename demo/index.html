<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Private sales-demo pages: keep out of search + link graph. -->
<meta name="robots" content="noindex, nofollow">
<meta name="googlebot" content="noindex, nofollow">
<title>Demo IA para The Shop Automotive Service | Elyon</title>
<meta name="description" content="Demostración personalizada de recepcionista de IA.">
<meta name="theme-color" content="#0F0F12">
<link rel="icon" type="image/svg+xml" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="18" fill="%232038E6"/><path d="M50 24a12 12 0 0 0-12 12v14a12 12 0 0 0 24 0V36a12 12 0 0 0-12-12Z" fill="%23ffffff"/><path d="M30 50a20 20 0 0 0 40 0h-7a13 13 0 0 1-26 0Zm17 26h6v-8h-6Z" fill="%23ffffff"/></svg>'>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<!-- ANALYTICS: the same GA4 / Meta Pixel snippet used on the main site can be
     pasted here; events already fire through trackEvent() in demo-page.js. -->
<link rel="stylesheet" href="/demo/demo.css">
</head>
<body>
<a class="skip" href="#main">Ir al contenido</a>

<header class="topbar">
  <div class="brand" id="brand-name">
    <!-- business name + industry filled by demo-page.js -->
  </div>
  <span class="top-chip" id="top-chip">Demo personalizada</span>
</header>

<main id="main">

  <!-- ============================= ACTIVE ============================= -->
  <section id="view-active" class="hidden">
    <div class="wrap">
      <div class="hero">

        <!-- left: pitch + primary CTA -->
        <div class="hero-left">
          <span class="badge"><span class="dot" aria-hidden="true"></span><span id="badge-text">Demo personalizada</span></span>
          <h1 class="h1 disp" id="headline"></h1>
          <p class="lede" id="lede"></p>
          <div class="meta-row" id="meta"></div>
          <div class="hero-cta">
            <a class="btn fill big" id="cta-hero" target="_blank" rel="noopener"></a>
            <p class="trust-line" id="trust-hero"></p>
          </div>
        </div>

        <!-- right: the live widget -->
        <div class="hero-right" id="widget-anchor">
          <div class="card">
            <div class="card-head">
              <span class="t" id="card-title"></span>
              <span class="idx" aria-hidden="true">VOICE · AI</span>
            </div>
            <div class="card-body">
              <ol class="steps" id="steps"></ol>

              <div class="widget-zone" id="widget-zone" data-widget-state="loading" aria-live="polite">
                <div class="loading" id="widget-loading">
                  <div class="bars" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span></div>
                  <span class="t" id="loading-text">Iniciando la recepcionista…</span>
                </div>
              </div>

              <div class="qs">
                <div class="qs-lbl" id="qs-label"></div>
                <ul id="qs-list"></ul>
              </div>

              <p class="notice" id="demo-notice"></p>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- how it works / next steps -->
    <section class="how">
      <div class="wrap">
        <span class="lbl" id="hw-eyebrow"></span>
        <h2 class="disp" id="hw-h"></h2>
        <div class="how-grid" id="how-grid"></div>
      </div>
    </section>

    <!-- why / benefits -->
    <section class="benefits">
      <div class="wrap">
        <span class="lbl bf-eyebrow" id="bf-eyebrow"></span>
        <h2 class="disp" id="bf-h"></h2>
        <p class="bf-lede" id="bf-lede"></p>
        <div class="bf-grid" id="benefits-grid"></div>
      </div>
    </section>

    <!-- mini FAQ / objection handling -->
    <section class="faq">
      <div class="wrap">
        <span class="lbl" id="fq-eyebrow"></span>
        <h2 class="disp" id="fq-h"></h2>
        <div class="faq-list" id="faq-list"></div>
      </div>
    </section>

    <!-- conversion -->
    <section class="convert">
      <div class="wrap">
        <h2 class="disp" id="cv-h"></h2>
        <p id="cv-p"></p>
        <p class="trust-line" id="trust-convert"></p>
        <div class="cta-row">
          <a class="btn fill big" id="cta-trial" target="_blank" rel="noopener"></a>
          <a class="btn" id="cta-tech" target="_blank" rel="noopener"></a>
        </div>
      </div>
    </section>
  </section>

  <!-- ============================= ENDED ============================== -->
  <section id="view-ended" class="state hidden">
    <div class="inner-state">
      <div class="code" aria-hidden="true">— —</div>
      <h1 class="disp" id="ended-title"></h1>
      <p id="ended-body"></p>
      <a class="btn fill" id="ended-btn" target="_blank" rel="noopener"></a>
    </div>
  </section>

  <!-- =========================== NOT FOUND =========================== -->
  <section id="view-notfound" class="state hidden">
    <div class="inner-state">
      <div class="code" aria-hidden="true">404</div>
      <h1 class="disp" id="nf-title"></h1>
      <p id="nf-body"></p>
      <a class="btn fill" id="nf-btn"></a>
    </div>
  </section>

</main>

<!-- mobile sticky CTA (hidden on desktop and on non-active states) -->
<div class="sticky-cta hidden" id="sticky-cta">
  <a class="btn fill" id="cta-sticky" target="_blank" rel="noopener"></a>
</div>

<footer class="foot">
  <span id="foot-left">Demostración privada</span>
  <span id="foot-right">Preparada por <a href="https://tryelyon.com/" rel="noopener">Elyon</a></span>
</footer>

<script src="/demo/demo-config.js"></script>
<script src="/demo/widget-loader.js"></script>
<script src="/demo/demo-page.js"></script>
</body>
</html>
