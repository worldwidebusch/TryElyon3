<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Private sales-demo pages: keep out of search + link graph. -->
<meta name="robots" content="noindex, nofollow">
<meta name="googlebot" content="noindex, nofollow">
<title>Conoce a Mateo — Recepcionista con IA | Elyon</title>
<meta name="description" content="Nunca vuelvas a perder un cliente por no contestar. Habla con Mateo, el recepcionista con IA. Demo en vivo.">
<!-- OG tags: WhatsApp/Messenger link previews when the demo link is shared -->
<meta property="og:type" content="website">
<meta property="og:title" content="Conoce a Mateo — Recepcionista con IA">
<meta property="og:description" content="Nunca vuelvas a perder un cliente por no contestar el teléfono. Habla con Mateo en vivo: atiende, agenda y da seguimiento 24/7.">
<meta property="og:locale" content="es_MX">
<meta name="theme-color" content="#0F0F12">
<link rel="icon" type="image/svg+xml" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%230F0F12"/><rect x="22" y="22" width="12" height="56" fill="%23EFEDE6"/><rect x="22" y="22" width="56" height="12" fill="%232038E6"/><rect x="22" y="44" width="44" height="12" fill="%23EFEDE6"/><rect x="22" y="66" width="32" height="12" fill="%23EFEDE6"/></svg>'>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Martian+Mono:wght@400;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<!-- ANALYTICS: the same GA4 / Meta Pixel snippet used on the main site can be
     pasted here; events already fire through trackEvent() in demo-page.js. -->
<link rel="stylesheet" href="/demo/demo.css">
</head>
<body>
<a class="skip" href="#main">Ir al contenido</a>

<header class="topbar">
  <div class="brand" id="brand-name">
    <!-- business or persona name filled by demo-page.js -->
  </div>
  <a class="top-chip" id="wa-header" target="_blank" rel="noopener"></a>
</header>

<main id="main">

  <!-- ============================= ACTIVE ============================= -->
  <section id="view-active" class="hidden">
    <div class="wrap">
      <div class="hero">

        <!-- left: pain hook -> persona -> CTA in the first viewport -->
        <div class="hero-left reveal">
          <span class="badge"><span class="dot" aria-hidden="true"></span><span id="badge-text">Demo en vivo</span></span>
          <h1 class="h1 disp" id="headline"></h1>
          <p class="lede" id="lede"></p>
          <div class="hero-cta">
            <a class="btn fill big" id="cta-hero" target="_blank" rel="noopener"></a>
            <p class="trust-line" id="trust-hero"></p>
          </div>
          <div class="meta-row" id="meta"></div>
        </div>

        <!-- right: the live widget -->
        <div class="hero-right reveal" id="widget-anchor">
          <div class="card">
            <div class="card-head">
              <div class="persona">
                <span class="avatar" aria-hidden="true">
                  <svg viewBox="0 0 40 40" width="40" height="40"><rect width="40" height="40" fill="#2038E6"/><g fill="#EFEDE6"><rect x="11" y="16" width="3" height="8"/><rect x="16" y="12" width="3" height="16"/><rect x="21" y="9" width="3" height="22"/><rect x="26" y="14" width="3" height="12"/></g></svg>
                </span>
                <div class="persona-id">
                  <b id="rcp-name">Mateo</b>
                  <small id="rcp-role">Recepcionista con IA</small>
                </div>
              </div>
              <span class="status"><i aria-hidden="true"></i><span id="status-text">Disponible 24/7</span></span>
            </div>
            <div class="card-body">
              <ol class="steps" id="steps"></ol>

              <div class="widget-zone" id="widget-zone" data-widget-state="loading" aria-live="polite">
                <div class="loading" id="widget-loading">
                  <div class="bars" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span></div>
                  <span class="t" id="loading-text">Iniciando…</span>
                </div>
              </div>

              <div class="qs">
                <div class="qs-lbl" id="qs-label"></div>
                <ul id="qs-list"></ul>
              </div>

              <p class="notice" id="demo-notice"></p>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- benefits: short checkmark lines, then a second CTA -->
    <section class="benefits">
      <div class="wrap reveal">
        <span class="lbl bf-eyebrow" id="bf-eyebrow"></span>
        <h2 class="disp" id="bf-h"></h2>
        <ul class="checklist" id="benefits-list"></ul>
        <p class="bf-close disp" id="bf-close"></p>
        <div class="cta-mid">
          <a class="btn fill big" id="cta-benefits" target="_blank" rel="noopener"></a>
        </div>
      </div>
    </section>

    <!-- how the trial works: 3 simple steps, last one highlighted -->
    <section class="how">
      <div class="wrap reveal">
        <span class="lbl" id="hw-eyebrow"></span>
        <h2 class="disp" id="hw-h"></h2>
        <div class="how-grid" id="how-grid"></div>
      </div>
    </section>

    <!-- mini FAQ / objection handling -->
    <section class="faq">
      <div class="wrap reveal">
        <span class="lbl" id="fq-eyebrow"></span>
        <h2 class="disp" id="fq-h"></h2>
        <div class="faq-list" id="faq-list"></div>
      </div>
    </section>

    <!-- closing conversion band -->
    <section class="convert">
      <div class="wrap reveal">
        <h2 class="disp" id="cv-h"></h2>
        <p id="cv-p"></p>
        <p class="trust-line" id="trust-convert"></p>
        <div class="cta-row">
          <a class="btn fill big" id="cta-trial" target="_blank" rel="noopener"></a>
          <a class="btn" id="cta-tech" target="_blank" rel="noopener"></a>
        </div>
      </div>
    </section>
  </section>

  <!-- ============================= ENDED ============================== -->
  <section id="view-ended" class="state hidden">
    <div class="inner-state">
      <div class="code" aria-hidden="true">— —</div>
      <h1 class="disp" id="ended-title"></h1>
      <p id="ended-body"></p>
      <a class="btn fill" id="ended-btn" target="_blank" rel="noopener"></a>
    </div>
  </section>

  <!-- =========================== NOT FOUND =========================== -->
  <section id="view-notfound" class="state hidden">
    <div class="inner-state">
      <div class="code" aria-hidden="true">404</div>
      <h1 class="disp" id="nf-title"></h1>
      <p id="nf-body"></p>
      <a class="btn fill" id="nf-btn"></a>
    </div>
  </section>

</main>

<!-- mobile sticky CTA: revealed by JS once the widget scrolls out of view -->
<div class="sticky-cta hidden" id="sticky-cta">
  <a class="btn fill" id="cta-sticky" target="_blank" rel="noopener"></a>
</div>

<footer class="foot2">
  <img class="f-logo" src="/brand/assets/elyon-lockup.svg" alt="Elyon" width="164" height="42">
  <div class="f-contact">
    <a class="wa" id="foot-wa" target="_blank" rel="noopener">WhatsApp</a>
    <a href="https://tryelyon.com/" rel="noopener">tryelyon.com</a>
  </div>
  <span class="f-small">Demostración privada · © 2026 Elyon</span>
</footer>

<script src="/demo/demo-config.js"></script>
<script src="/demo/widget-loader.js"></script>
<script src="/demo/demo-page.js"></script>
</body>
</html>
